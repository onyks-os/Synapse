name: Docker release (GHCR)

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.node
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/Synapse-node:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/Synapse-node:latest

